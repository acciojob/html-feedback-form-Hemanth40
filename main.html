<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<body>

  <h2>Feedback Form</h2>

  <form method="post">

    <!-- Name -->
    <label for="name">Name:</label><br>
    <input type="text" id="name" minlength="3" maxlength="50" required><br><br>

    <!-- Portfolio -->
    <label for="portfolio">Portfolio:</label><br>
    <input type="url" id="portfolio" required><br><br>

    <!-- Favorite Color -->
    <label for="favColor">Favorite Color:</label><br>
    <input type="color" id="favColor"><br><br>

    <!-- Likeness -->
    <label for="likeness">Likeness:</label><br>
    <input type="range" id="likeness" min="1" max="100"><br><br>

    <!-- Submit -->
    <button type="submit">Submit</button>

  </form>
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
